<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPT PAÑPURI Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <meta name="application-name" content="KPT PAÑPURI">
    <meta name="apple-mobile-web-app-title" content="KPT PAÑPURI">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="https://apaze1150-coder.github.io/kpt-panpuri-training/manifest.json?v=2">

    <link rel="icon" type="image/png" sizes="192x192" href="https://apaze1150-coder.github.io/kpt-panpuri-training/logo.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="https://apaze1150-coder.github.io/kpt-panpuri-training/logo.png?v=2">

    <style>
        :root { --red: #990000; --gold: #C5A059; --black: #1A1A1A; --white: #FFFFFF; }
        body { background: #E5E5E5; margin: 0; font-family: 'Prompt', sans-serif; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: var(--white); min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        .page { display: none; flex-direction: column; flex-grow: 1; animation: fadeIn 0.4s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 3px solid #EEE; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-main { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; font-family: 'Prompt'; transition: 0.2s; width: 100%; margin-bottom: 10px; }
        .btn-main:active { transform: scale(0.98); }
        .btn-red { background: var(--red); color: white; border: none; }
        .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); padding: 14px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Prompt'; }
        .btn-outline:hover { background: var(--gold); color: var(--white); }
        .btn-admin { background: transparent; border: none; color: #aaa; font-size: 11px; cursor: pointer; letter-spacing: 1px; font-family: 'Prompt'; transition: 0.2s;}
        .btn-admin:hover { color: var(--gold); }
        .input-box { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Prompt'; font-size: 14px; box-sizing: border-box; }
        .btn-module { background: #fff; border: 1px solid var(--gold); color: var(--black); padding: 15px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-weight: 600; text-align: left; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .btn-module:hover { background: #FFFBF2; }
        .header { background: var(--black); color: var(--gold); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position:relative; }
        .progress-bar { height: 4px; background: #eee; width: 100%; }
        .progress-fill { height: 100%; background: var(--red); width: 0%; transition: 0.4s; }
        .image-box { width: 100%; height: 280px; background: var(--white); display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .scent-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .choices { display: grid; gap: 8px; padding: 0 20px 20px 20px;}
        .opt { background: #fff; border: 1px solid #ddd; padding: 15px; text-align: left; border-radius: 6px; cursor: pointer; font-size: 14px; line-height: 1.4; transition: 0.2s; }
        .correct { background: #E8F5E9 !important; border-color: #2E7D32 !important; color: #1B5E20; font-weight: bold; }
        .wrong { background: #FFEBEE !important; border-color: var(--red) !important; color: var(--red); }
        .score-circle { width: 120px; height: 120px; border: 5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; font-weight: bold; color: var(--black); }
        .mistake-item { display: flex; align-items: center; background: #F9F9F9; margin-bottom: 10px; padding: 10px; border-radius: 8px; border-left: 4px solid var(--red); text-align: left; }
        .mistake-thumb { width: 50px; height: 50px; object-fit: contain; margin-right: 15px; background: white; border-radius: 4px; border: 1px solid #eee; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .admin-table th { background: var(--black); color: var(--gold); }
        .badge { background: var(--gold); color: var(--black); padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; margin-right: 5px; display: inline-block;}
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-card { background: var(--white); width: 85%; max-width: 320px; padding: 25px; border-radius: 12px; text-align: center; border-top: 5px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-card.alert-red { border-top-color: var(--red); }
        .btn-half { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Prompt'; font-weight: bold; transition: 0.2s; }
        .slide-in { animation: slideDown 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="confirmOverlay" class="modal-overlay">
            <div class="modal-card alert-red slide-in">
                <h3 style="margin-top:0; color:var(--black);">ยืนยันการออก?</h3>
                <p style="font-size: 13px; color: #666; margin-bottom: 25px;">ข้อมูลคะแนนจะไม่ถูกบันทึก ต้องการกลับหน้าหลัก?</p>
                <div style="display:flex; gap:10px;">
                    <button class="btn-half" style="background:#eee; color:#555;" onclick="closeConfirm()">ยกเลิก</button>
                    <button class="btn-half" style="background:var(--red); color:white;" onclick="proceedExit()">ยืนยัน</button>
                </div>
            </div>
        </div>

        <div id="adminLoginOverlay" class="modal-overlay">
            <div class="modal-card slide-in">
                <h3 style="margin-top:0; color:var(--black); letter-spacing: 1px;">ADMIN LOGIN</h3>
                <div style="position: relative; width: 100%; margin-bottom: 12px;">
                    <input type="password" id="adminPwdInput" class="input-box" placeholder="Password" style="text-align:center; padding-right: 40px;">
                    <span id="toggleEye" onclick="togglePassword()" style="position: absolute; right: 15px; top: 38%; cursor: pointer;">👁️</span>
                </div>
                <p id="adminErrorMsg" style="color:var(--red); font-size:12px; display:none;">รหัสผ่านไม่ถูกต้อง!</p>
                <div style="display:flex; gap:10px; margin-top: 15px;">
                    <button class="btn-half" style="background:#eee; color:#555;" onclick="closeAdminLogin()">ยกเลิก</button>
                    <button class="btn-half" style="background:var(--black); color:var(--gold);" onclick="submitAdminLogin()">ตกลง</button>
                </div>
            </div>
        </div>

        <div id="loader"><div class="spinner"></div><span style="color:var(--gold); font-size: 12px; font-weight: bold;">LOADING...</span></div>

        <div id="pageWelcome" class="page active" style="padding: 40px 20px; justify-content: center;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h2 style="letter-spacing: 3px; color: var(--black); margin-bottom: 5px;">PAÑPURI</h2>
                <p style="color: var(--gold); font-weight: 600; margin-top: 0;">SCENT MASTERY</p>
            </div>
            <button class="btn-main" onclick="showPage('pageGuest')">1. GUEST MODE (บุคคลทั่วไป)</button>
            <button class="btn-main btn-red" onclick="showPage('pageStaff')">2. STAFF PAÑPURI (พนักงาน)</button>
            <div style="text-align:center; margin-top: 40px;"><button class="btn-admin" onclick="openAdminLogin()">ADMIN LOGIN</button></div>
        </div>

        <div id="pageGuest" class="page" style="padding: 30px 20px;">
            <h3 style="color: var(--black); text-align:center;">GUEST LEARNING</h3>
            <div style="display: grid; gap: 10px; margin-top:20px;">
                <button class="btn-module" onclick="startExam('guest', 'Scent')">🌸 1. Signature Scents</button>
                <button class="btn-module" onclick="startExam('guest', 'Product')">🛍️ 2. Product Names</button>
                <button class="btn-module" onclick="startExam('guest', 'Advanced')">✨ 3. Usage & Rituals</button>
            </div>
            <button class="btn-outline" style="margin-top: 30px;" onclick="resetApp()">ย้อนกลับ (HOME)</button>
        </div>

        <div id="pageStaff" class="page" style="padding: 30px 20px;">
            <h3 style="border-left: 4px solid var(--red); padding-left: 10px; margin-top: 0;"> STAFF LOGIN</h3>
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <input type="text" id="staffID" class="input-box" placeholder="รหัสพนักงาน (ID)" style="margin:0;">
                <button class="btn-main" style="width:auto; margin:0; padding: 0 20px;" onclick="checkStaffProfile()">ค้นหา</button>
            </div>
            <div id="staffDetails" style="display:none; animation: fadeIn 0.5s;">
                <input type="text" id="staffName" class="input-box" placeholder="ชื่อ - นามสกุล (Full Name)">
                <select id="staffShop" class="input-box">
                    <option value="">เลือกสาขา (Shop)</option>
                    <option value="TE1">TE1</option><option value="TE3">TE3</option><option value="TW4">TW4</option><option value="Don mueang">Don mueang</option><option value="Phuket">Phuket</option>
                </select>
                <div id="certBadges" style="margin-bottom: 15px;"></div>
                <h4 style="margin: 20px 0 10px; font-size: 14px; color: var(--gold);">CHOOSE MODULE</h4>
                <div style="display: grid; gap: 10px;">
                    <button class="btn-module" onclick="startExam('staff', 'Scent')">🌸 1. Signature Scents</button>
                    <button class="btn-module" onclick="startExam('staff', 'Product')">🛍️ 2. Product Names</button>
                    <button class="btn-module" onclick="startExam('staff', 'Advanced')">✨ 3. Usage & Rituals</button>
                </div>
            </div>
            <button class="btn-outline" style="margin-top: 30px;" onclick="resetApp()">ย้อนกลับ (HOME)</button>
        </div>

        <div id="pageExam" class="page">
            <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
                <div style="width:24px;"></div><div style="font-weight: bold; font-size: 14px; letter-spacing: 2px;">SCENT MASTERY EXAM</div><div onclick="openConfirm()" style="cursor:pointer; font-size:22px; color:var(--red); font-weight:bold;">&times;</div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
            <div class="image-box"><img id="scentImg" class="scent-img" src=""></div>
            <div style="padding: 0 20px;">
                <p id="stepInfo" style="font-size: 12px; color: #888; font-weight: 600; text-align: center;">QUESTION 1</p>
                <button class="btn-main" style="background:var(--white); color:var(--red); border-color:var(--red);" onclick="playAudio()">🔊 LISTEN VOICE</button>
            </div>
            <div class="choices" id="choicesBox"></div>
        </div>

        <div id="pageResult" class="page" style="padding: 30px 20px; text-align: center; background: white;">
            <h2 style="margin:0 0 10px 0; color: var(--red);">FINISHED!</h2>
            <div class="score-circle" id="scoreValue">0/0</div>
            <div id="mistakeArea" style="margin-top: 30px; max-height: 350px; overflow-y: auto;"></div>
            <button class="btn-outline" style="margin-top: 30px;" onclick="resetApp()">กลับหน้าหลัก (HOME)</button>
        </div>

        <div id="pageAdmin" class="page" style="padding: 20px; background: white;">
            <div class="header" style="margin:-20px -20px 20px -20px;">
                <div style="font-weight: bold; font-size: 16px;">ADMIN DASHBOARD</div>
            </div>
            <div style="display:flex; justify-content: space-between; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <div style="text-align:center;"><div style="font-size: 12px; color: #666;">Total Traffic</div><div id="adminTraffic" style="font-size: 24px; font-weight: bold; color: var(--gold);">0</div></div>
                <div style="text-align:center;"><div style="font-size: 12px; color: #666;">Staff Tests</div><div id="adminTests" style="font-size: 24px; font-weight: bold; color: var(--red);">0</div></div>
            </div>
            <div style="overflow-x: auto;">
                <table class="admin-table" id="adminTable">
                    <thead><tr><th>Date</th><th>Shop</th><th>Name</th><th>Module</th><th>Score</th></tr></thead><tbody></tbody>
                </table>
            </div>
            <button class="btn-outline" style="margin-top: 30px; border-color:var(--red); color:var(--red);" onclick="resetApp()">LOGOUT</button>
        </div>
    </div>

    <script>
        // 🚨 สำคัญมาก! เอา URL ของ Google Apps Script มาวางตรงนี้ 🚨
        const API_URL = "https://script.google.com/macros/s/AKfycbyd-Tp1s8kzyXH8GH5pEF-5nE_Ra4DrO99eZqR9iiejAxOmskUdBqYxs_mltAEhPWr4/exec";

        // ระบบสื่อสารหลังบ้าน (Fetch API) 
        async function callAPI(action, payload = {}) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, ...payload })
                });
                return await response.json();
            } catch (error) {
                alert("เชื่อมต่อขัดข้อง กรุณาเช็คอินเทอร์เน็ตหรือ API_URL");
                return null;
            }
        }

        let scents = [], current = 0, score = 0, mistakes = [], currentMode = "", staffInfo = {};

        // บันทึกคนเข้าเว็บทันทีที่โหลดเสร็จ
        window.onload = () => callAPI('logTraffic');

        function showPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pageId).classList.add('active'); }
        function openConfirm() { document.getElementById('confirmOverlay').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }
        function proceedExit() { closeConfirm(); resetApp(); }
        
        function togglePassword() {
            const p = document.getElementById('adminPwdInput'), e = document.getElementById('toggleEye');
            if (p.type === 'password') { p.type = 'text'; e.innerText = '🙈'; } else { p.type = 'password'; e.innerText = '👁️'; }
        }

        function openAdminLogin() {
            document.getElementById('adminPwdInput').value = ''; document.getElementById('adminPwdInput').type = 'password';
            document.getElementById('toggleEye').innerText = '👁️'; document.getElementById('adminErrorMsg').style.display = 'none';
            document.getElementById('adminLoginOverlay').style.display = 'flex';
        }
        function closeAdminLogin() { document.getElementById('adminLoginOverlay').style.display = 'none'; }

        async function submitAdminLogin() {
            if(document.getElementById('adminPwdInput').value === "kpt1234") { 
                document.getElementById('adminErrorMsg').style.display = 'none'; closeAdminLogin(); 
                document.getElementById('loader').style.display = 'flex';
                
                const data = await callAPI('getAdminData');
                document.getElementById('loader').style.display = 'none';
                if(!data || data.status === "error") return alert("เกิดข้อผิดพลาด: " + (data ? data.error : "No Data"));

                showPage('pageAdmin');
                document.getElementById('adminTraffic').innerText = data.traffic || 0;
                document.getElementById('adminTests').innerText = data.profiles ? data.profiles.length : 0;
                const tbody = document.querySelector('#adminTable tbody'); tbody.innerHTML = '';
                
                if(!data.profiles || data.profiles.length === 0) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">ยังไม่มีข้อมูล</td></tr>';
                else {
                    data.profiles.slice(0, 20).forEach(p => {
                        const dateObj = new Date(p[0]); const dateStr = `${dateObj.getDate()}/${dateObj.getMonth()+1}`;
                        tbody.innerHTML += `<tr><td>${dateStr}</td><td>${p[3]||"-"}</td><td>${p[2]||"-"}</td><td>${p[4]||"-"}</td><td><b style="color:var(--red);">${p[5]!==undefined?p[5]:"-"}</b></td></tr>`;
                    });
                }
            } else document.getElementById('adminErrorMsg').style.display = 'block';
        }

        function resetApp() {
            current = 0; score = 0; mistakes = []; scents = [];
            document.getElementById('staffDetails').style.display = 'none'; document.getElementById('staffID').value = '';
            document.getElementById('staffName').value = ''; document.getElementById('staffShop').value = ''; document.getElementById('certBadges').innerHTML = '';
            showPage('pageWelcome');
        }

        async function checkStaffProfile() {
            const empId = document.getElementById('staffID').value;
            if(!empId) return alert("กรุณากรอกรหัสพนักงาน");
            document.getElementById('loader').style.display = 'flex';
            
            const res = await callAPI('getStaffProfile', {empId: empId});
            document.getElementById('loader').style.display = 'none';
            if(!res) return;

            document.getElementById('staffDetails').style.display = 'block';
            if(res.exists) {
                document.getElementById('staffName').value = res.name; document.getElementById('staffShop').value = res.shop;
                let b = '<div style="font-size:12px; margin-bottom:5px; color:#888;">Certificates (ผ่านแล้ว):</div>';
                if(res.passedModules.length > 0) res.passedModules.forEach(m => b += `<span class="badge">🏅 ${m}</span>`);
                else b += `<span style="font-size:12px; color:var(--red);">ยังไม่เคยทดสอบ</span>`;
                document.getElementById('certBadges').innerHTML = b;
            } else document.getElementById('certBadges').innerHTML = '<span style="font-size:12px; color:var(--gold);">ผู้ใช้งานใหม่ กรุณากรอกชื่อและสาขา</span>';
        }

        async function startExam(mode, moduleName) {
            currentMode = mode;
            if(mode === 'staff') {
                staffInfo = { empId: document.getElementById('staffID').value, firstName: document.getElementById('staffName').value, shop: document.getElementById('staffShop').value, module: moduleName };
                if (!staffInfo.empId || !staffInfo.firstName || !staffInfo.shop) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            } else staffInfo = { module: moduleName };

            document.getElementById('loader').style.display = 'flex';
            const data = await callAPI('getScentData');
            
            scents = data ? data.filter(item => item.category === moduleName) : [];
            if (scents.length === 0) { document.getElementById('loader').style.display = 'none'; return alert(`ไม่พบข้อมูลในหมวด ${moduleName}`); }
            
            scents = scents.sort(() => Math.random() - 0.5);
            document.getElementById('loader').style.display = 'none';
            showPage('pageExam'); render();
        }

        function render() {
            const q = scents[current];
            document.getElementById('scentImg').src = q.imageUrl; document.getElementById('stepInfo').innerText = `QUESTION ${current + 1} / ${scents.length}`;
            document.getElementById('progFill').style.width = `${((current + 1) / scents.length) * 100}%`;

            let choices = [{ id: q.id, text: `${q.nameTh} - ${q.chinese} - ${q.pinyin}`, correct: true }, ...scents.filter(s => s.id !== q.id).sort(() => Math.random() - 0.5).slice(0, 3).map(s => ({ id: s.id, text: `${s.nameTh} - ${s.chinese} - ${s.pinyin}`, correct: false }))].sort(() => Math.random() - 0.5);
            const box = document.getElementById('choicesBox'); box.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('button'); btn.className = 'opt'; btn.innerText = c.text; btn.onclick = () => handleAnswer(btn, c.correct); box.appendChild(btn);
            });
        }

        function playAudio() { const m = new SpeechSynthesisUtterance(scents[current].chinese); m.lang = 'zh-CN'; m.rate = 0.8; window.speechSynthesis.speak(m); }

        function handleAnswer(btn, isCorrect) {
            const btns = document.querySelectorAll('.opt'); btns.forEach(b => b.style.pointerEvents = 'none');
            if (isCorrect) { btn.classList.add('correct'); score++; } else { btn.classList.add('wrong'); mistakes.push(scents[current]); btns.forEach(b => { if (b.innerText.includes(scents[current].chinese)) b.classList.add('correct'); }); }
            setTimeout(() => { current++; if (current < scents.length) render(); else showSummary(); }, 1500);
        }

        function showSummary() {
            showPage('pageResult'); document.getElementById('scoreValue').innerText = `${score}/${scents.length}`;
            if (score >= (scents.length * 0.8)) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors:['#C5A059', '#990000'] });
            
            const area = document.getElementById('mistakeArea'); area.innerHTML = '<h4 style="border-bottom: 1px solid #ddd; padding-bottom: 5px; text-align:left;">REVIEW MISTAKES</h4>';
            if (mistakes.length === 0) area.innerHTML += '<p style="color:green; font-weight:bold;">Perfect!</p>';
            else mistakes.forEach(m => area.innerHTML += `<div class="mistake-item"><img src="${m.imageUrl}" class="mistake-thumb"><div style="font-size: 12px; line-height: 1.4;"><b style="color:var(--red)">${m.nameTh}</b><br>${m.chinese} (${m.pinyin})</div></div>`);
            
            if (currentMode === "staff") { staffInfo.score = score; callAPI('saveStaffScore', {data: staffInfo}); } 
            else callAPI('saveGuestScore', {data: { name: "Guest User", score: score }});
        }
    </script>
</body>
</html>
